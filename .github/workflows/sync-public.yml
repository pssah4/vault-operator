name: Sync to vault-operator (public)

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Remove internal files
        run: |
          # Internal directories — must not appear in the public repo
          # (docs/ stays — needed for GitHub Pages)
          # Save public workflows before removing .github
          cp .github/workflows/release.yml /tmp/release.yml 2>/dev/null || true
          cp .github/workflows/deploy-pages.yml /tmp/deploy-pages.yml 2>/dev/null || true

          for dir in _devprocess .github scripts _global _memory; do
            git rm -rf --cached "$dir" 2>/dev/null || true
            rm -rf "$dir"
          done

          # Restore public workflows
          mkdir -p .github/workflows
          cp /tmp/release.yml .github/workflows/release.yml 2>/dev/null || true
          cp /tmp/deploy-pages.yml .github/workflows/deploy-pages.yml 2>/dev/null || true
          git add .github/workflows/ 2>/dev/null || true

          # Internal files
          git rm -f --cached CLAUDE.md 2>/dev/null || true
          rm -f CLAUDE.md

      - name: Commit filtered state
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          if ! git diff --cached --quiet; then
            git commit -m "chore: strip internal files for public mirror [skip ci]"
          fi

      - name: Push to vault-operator
        env:
          TOKEN: ${{ secrets.OBSILO_PUBLIC_TOKEN }}
        run: |
          git remote add vault-operator "https://x-access-token:${TOKEN}@github.com/pssah4/vault-operator.git"
          git push vault-operator HEAD:main --force
