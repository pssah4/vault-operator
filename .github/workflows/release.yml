name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.0 — must match manifest.json)'
        required: true
        default: '1.0.0'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          rm -rf node_modules
          npm install --no-audit --no-fund
          npm install @rollup/rollup-linux-x64-gnu --no-audit --no-fund --no-save

      - name: Build plugin
        run: node esbuild.config.mjs production

      - name: Collect release assets
        run: |
          mkdir -p release-assets/skills release-assets/templates

          # Core files
          cp main.js manifest.json styles.css release-assets/

          # Worker scripts (built by esbuild entrypoints)
          [ -f sandbox-worker.js ] && cp sandbox-worker.js release-assets/
          [ -f mcp-server-worker.js ] && cp mcp-server-worker.js release-assets/

          # sql.js WASM binaries for KnowledgeDB (FIX-16)
          for wasm in sql-wasm.wasm sql-wasm-browser.wasm; do
            [ -f "node_modules/sql.js/dist/$wasm" ] && cp "node_modules/sql.js/dist/$wasm" release-assets/
          done

          # ONNX Runtime WASM binaries for Reranker
          for ort in ort-wasm-simd-threaded.wasm ort-wasm-simd-threaded.mjs; do
            [ -f "node_modules/onnxruntime-web/dist/$ort" ] && cp "node_modules/onnxruntime-web/dist/$ort" release-assets/
          done

          # Bundled skills
          if [ -d "bundled-skills" ]; then
            for skill_dir in bundled-skills/*/; do
              skill_name=$(basename "$skill_dir")
              mkdir -p "release-assets/skills/$skill_name"
              cp "$skill_dir"* "release-assets/skills/$skill_name/" 2>/dev/null || true
            done
          fi

          # PPTX templates
          if [ -d "assets/templates" ]; then
            cp assets/templates/*.pptx release-assets/templates/ 2>/dev/null || true
          fi

          # Logo
          [ -f src/assets/logo.png ] && cp src/assets/logo.png release-assets/

          # Create tarball of extras (skills + templates have directory structure)
          cd release-assets
          tar czf ../vault-operator-assets.tar.gz --exclude='main.js' --exclude='manifest.json' --exclude='styles.css' .
          cd ..

          echo "=== Release assets ==="
          find release-assets -type f | sort

      - name: Verify build output
        run: |
          ls -lh release-assets/main.js release-assets/manifest.json release-assets/styles.css
          echo "manifest version: $(jq -r .version release-assets/manifest.json)"
          echo "WASM files:"
          ls -lh release-assets/*.wasm 2>/dev/null || echo "  (none)"
          echo "Workers:"
          ls -lh release-assets/*-worker.js 2>/dev/null || echo "  (none)"

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          body: |
            ## Vault Operator v${{ inputs.version }}

            Install via [BRAT](https://github.com/TfTHacker/obsidian42-brat):
            1. Install BRAT from Community Plugins
            2. BRAT → Add Beta Plugin → `https://github.com/pssah4/vault-operator`

            Or install manually:
            1. Download `main.js`, `manifest.json`, `styles.css` into `.obsidian/plugins/vault-operator/`
            2. Download and extract `vault-operator-assets.tar.gz` into the same folder
          files: |
            release-assets/main.js
            release-assets/manifest.json
            release-assets/styles.css
            vault-operator-assets.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
